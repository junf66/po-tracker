<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PO管理ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#0b0f1a;color:#e2e8f0;min-height:100vh;font-size:14px}
nav{display:flex;align-items:center;gap:2px;padding:12px 24px 0;background:#0b0f1a;border-bottom:1px solid #1e2d4d}
.tab{background:transparent;border:none;color:#94a3b8;padding:10px 18px;cursor:pointer;font-family:inherit;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:#e2e8f0}
.tab.on{color:#3b82f6;border-bottom-color:#3b82f6}
.sp{flex:1}
.upd{font-size:11px;color:#334155;padding-right:4px}
.page{display:none;padding:22px}
.page.on{display:block}
/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.sc{background:#131a2e;border:1px solid #1e2d4d;border-radius:10px;padding:14px}
.sl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.sv{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.pos{color:#34d399}.neg{color:#f87171}.acc{color:#60a5fa}.warn{color:#fbbf24}
/* charts */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.cc{background:#131a2e;border:1px solid #1e2d4d;border-radius:10px;padding:16px}
.ct{font-size:11px;color:#94a3b8;margin-bottom:10px}
/* filters */
.fs{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fg label{font-size:11px;color:#94a3b8;margin-right:4px}
select,input[type=text]{background:#0d1220;border:1px solid #1e3a5f;color:#e2e8f0;padding:5px 8px;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
select:focus,input:focus{border-color:#3b82f6}
/* table */
.tw{background:#131a2e;border:1px solid #1e2d4d;border-radius:10px;overflow:hidden}
.th2{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e2d4d}
.th2 span{font-size:11px;color:#64748b}
.sc2{overflow-x:auto;max-height:420px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:680px}
thead{position:sticky;top:0;z-index:2}
th{background:#0d1220;padding:8px 10px;text-align:left;color:#64748b;font-weight:500;border-bottom:1px solid #1e2d4d;white-space:nowrap;cursor:pointer}
th:hover{color:#93c5fd}
td{padding:7px 10px;border-bottom:1px solid #111827;white-space:nowrap}
tr:hover td{background:#0e1525}
.num{text-align:right;font-family:'JetBrains Mono',monospace}
/* badges */
.b{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.b-r{background:#1e3a5f;color:#93c5fd}
.b-n{background:#14291a;color:#4ade80}
.b-c{background:#3b2700;color:#fbbf24}
.b-ban{background:#3b0000;color:#f87171}
.b-new{background:#1e1a40;color:#c4b5fd}
.b-pend{background:#3b2700;color:#fbbf24}
.b-next{background:#1a2a40;color:#60a5fa}
.b-done{background:#0a2a1a;color:#34d399}
/* new records panel */
.nr-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.nr-card{background:#131a2e;border:1px solid #1e2d4d;border-radius:10px;padding:12px 16px}
.nr-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.nr-name{font-weight:500}
.nr-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;font-size:11px;color:#64748b}
.nr-val{color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:12px}
.empty{color:#334155;text-align:center;padding:32px;font-size:13px}
/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0b0f1a}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:3px}
@media(max-width:700px){.stats{grid-template-columns:1fr 1fr}.cg{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav>
  <button class="tab on" id="t-d" onclick="page('d')">ダッシュボード</button>
  <button class="tab"    id="t-n" onclick="page('n')">新着PO<span id="pend-cnt" style="display:none;margin-left:6px;background:#fbbf24;color:#412402;font-size:10px;padding:1px 6px;border-radius:9px;font-weight:700"></span></button>
  <span class="sp"></span>
  <span class="upd" id="upd-label"></span>
</nav>

<!-- ダッシュボード -->
<div id="p-d" class="page on">
  <div class="fs">
    <div class="fg"><label>年</label>
      <select id="fy" onchange="render()"><option value="">全年</option><option>2021</option><option>2022</option><option>2023</option><option>2024</option><option>2025</option></select></div>
    <div class="fg"><label>種類</label>
      <select id="ft" onchange="render()"><option value="">全種類</option><option value="普通">普通</option><option value="リート">REIT</option></select></div>
    <div class="fg"><label>注意</label>
      <select id="fa" onchange="render()"><option value="">全て</option><option value="注意">注意</option><option value="売り禁">売り禁</option></select></div>
    <div class="fg"><label>銘柄</label>
      <input id="fn" type="text" placeholder="検索..." style="width:110px" oninput="render()"></div>
  </div>

  <div class="stats">
    <div class="sc"><div class="sl">対象件数</div><div class="sv acc" id="s0">–</div></div>
    <div class="sc"><div class="sl">平均騰落率（始値）</div><div class="sv" id="s1">–</div></div>
    <div class="sc"><div class="sl">平均騰落率（終値）</div><div class="sv" id="s2">–</div></div>
    <div class="sc"><div class="sl">勝率（始値＋）</div><div class="sv acc" id="s3">–</div></div>
  </div>

  <div class="cg">
    <div class="cc"><div class="ct">年別 平均騰落率（始値）</div>
      <div style="position:relative;height:200px"><canvas id="cy"></canvas></div></div>
    <div class="cc"><div class="ct">騰落率（始値）分布</div>
      <div style="position:relative;height:200px"><canvas id="cd"></canvas></div></div>
  </div>

  <div class="tw">
    <div class="th2"><span id="tl" style="font-size:12px;color:#94a3b8">全銘柄</span><span id="tc"></span></div>
    <div class="sc2"><table>
      <thead><tr>
        <th onclick="sort(0)">年</th><th onclick="sort(1)">銘柄</th>
        <th>種類</th><th>注意</th>
        <th class="num" onclick="sort(4)">PO規模(億)</th>
        <th class="num" onclick="sort(5)">規模割合</th>
        <th class="num" onclick="sort(6)">騰落率(始)</th>
        <th class="num" onclick="sort(7)">騰落率(終)</th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table></div>
  </div>
</div>

<!-- 新着PO -->
<div id="p-n" class="page">
  <div id="nr-list" class="nr-list"></div>
</div>

/* ─────── 状態 ────────────────────────────────────────────────────────────── */
let newRecs=[], combined=[], filt=[], sCol=-1, sAsc=true;
let cY, cD;

/* ─────── データ読み込み ──────────────────────────────────────────────────── */
async function loadNewRecs(){
  try{
    const res = await fetch("./data/po_records.json?t="+Date.now());
    if(!res.ok) return;
    const json = await res.json();
    newRecs = (json.records || json || []).filter(r=>r.ret_open!==null&&r.ret_open!==undefined);
    const upd = json.last_updated;
    if(upd) document.getElementById("upd-label").textContent =
      "最終更新: "+upd.slice(0,16).replace("T"," ");
    updatePendingBadge(json.records||json||[]);
  }catch(e){
    console.warn("JSON読み込みスキップ（ローカル確認時は正常）:",e.message);
  }
}

function buildCombined(){
  const hist = HIST.map(h=>({src:"hist",year:h[0],name:h[1],type:h[2],alert:h[3],scale:h[4],pct:h[5],retOpen:h[6],retClose:h[7]}));
  const nw   = newRecs.map(r=>({src:"new",year:r.year||new Date().getFullYear(),name:r.name,type:r.type,alert:r.alert||"",scale:r.po_scale,pct:r.po_pct,retOpen:r.ret_open,retClose:r.ret_close}));
  combined   = [...hist,...nw];
}

function updatePendingBadge(recs){
  const n = recs.filter(r=>r.status!=="complete").length;
  const el= document.getElementById("pend-cnt");
  el.style.display = n>0?"inline":"none";
  el.textContent   = n;
}

/* ─────── フィルタ ────────────────────────────────────────────────────────── */
function getFiltered(){
  const yr=document.getElementById("fy").value;
  const tp=document.getElementById("ft").value;
  const al=document.getElementById("fa").value;
  const nm=document.getElementById("fn").value.toLowerCase();
  return combined.filter(r=>{
    if(yr&&r.year!=+yr) return false;
    if(tp&&r.type!==tp) return false;
    if(al&&r.alert!==al) return false;
    if(nm&&!r.name.toLowerCase().includes(nm)) return false;
    return true;
  });
}

function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:null}
function fmt(v,d=2){return v!=null?(v>=0?"+":"")+v.toFixed(d)+"%":"–"}
function col(v){return v==null?"":v>0?"pos":v<0?"neg":""}
function fmtCell(v){
  if(v==null) return '<span style="color:#334155">–</span>';
  const s=Math.abs(v).toFixed(2)+"%";
  if(v>0) return `<span class="pos">+${s}</span>`;
  if(v<0) return `<span class="neg">-${s}</span>`;
  return `<span style="color:#64748b">${s}</span>`;
}

/* ─────── チャート ───────────────────────────────────────────────────────── */
function renderCharts(data){
  const yrs=[2021,2022,2023,2024,2025];
  const yVals=yrs.map(y=>{
    const rows=data.filter(r=>r.year===y&&r.retOpen!=null);
    return rows.length?+avg(rows.map(r=>r.retOpen)).toFixed(2):null;
  });
  if(cY) cY.destroy();
  cY=new Chart(document.getElementById("cy"),{type:"bar",
    data:{labels:yrs.map(String),datasets:[{data:yVals,
      backgroundColor:yVals.map(v=>v==null?"#1e2d4d":v>=0?"#059669":"#dc2626"),
      borderRadius:4,barPercentage:0.5}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y!=null?c.parsed.y.toFixed(2)+"%":"–"}}},
      scales:{x:{ticks:{color:"#64748b",font:{size:11}},grid:{color:"#1e2d4d"}},
              y:{ticks:{color:"#64748b",font:{size:11},callback:v=>v+"%"},grid:{color:"#1e2d4d"}}}}});

  const bkts=[[-25,-20],[-20,-15],[-15,-10],[-10,-5],[-5,0],[0,5],[5,10],[10,15],[15,20],[20,30]];
  const cnts=bkts.map(([lo,hi])=>data.filter(r=>r.retOpen!=null&&r.retOpen>=lo&&r.retOpen<hi).length);
  if(cD) cD.destroy();
  cD=new Chart(document.getElementById("cd"),{type:"bar",
    data:{labels:bkts.map(b=>b[0]+"〜"),datasets:[{data:cnts,
      backgroundColor:bkts.map(b=>b[0]>=0?"#059669":"#dc2626"),
      borderRadius:3,barPercentage:0.85}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y+"件"}}},
      scales:{x:{ticks:{color:"#64748b",font:{size:10},maxRotation:40},grid:{color:"#1e2d4d"}},
              y:{ticks:{color:"#64748b",font:{size:11}},grid:{color:"#1e2d4d"}}}}});
}

/* ─────── テーブル ───────────────────────────────────────────────────────── */
function renderTable(data){
  document.getElementById("tc").textContent=data.length+"件";
  document.getElementById("tb").innerHTML=data.map(r=>`<tr>
    <td style="color:#64748b;font-family:monospace">${r.year}</td>
    <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis" title="${r.name}">
      ${r.name}${r.src==="new"?' <span class="b b-new">NEW</span>':''}</td>
    <td><span class="b ${r.type==="リート"?"b-r":"b-n"}">${r.type}</span></td>
    <td>${r.alert?`<span class="b ${r.alert==="注意"?"b-c":"b-ban"}">${r.alert}</span>`:""}</td>
    <td class="num">${r.scale?r.scale.toLocaleString():"–"}</td>
    <td class="num">${r.pct?r.pct.toFixed(1)+"%":"–"}</td>
    <td class="num">${fmtCell(r.retOpen)}</td>
    <td class="num">${fmtCell(r.retClose)}</td>
  </tr>`).join("");
}

function sort(col){
  if(sCol===col) sAsc=!sAsc; else{sCol=col;sAsc=true;}
  const keys=["year","name","type","alert","scale","pct","retOpen","retClose"];
  filt.sort((a,b)=>{
    const va=a[keys[col]],vb=b[keys[col]];
    if(va==null) return 1; if(vb==null) return -1;
    return sAsc?(va>vb?1:-1):(va<vb?1:-1);
  });
  renderTable(filt);
}

/* ─────── 新着POパネル ───────────────────────────────────────────────────── */
function renderNewPanel(){
  const el=document.getElementById("nr-list");
  const allNew = (window._allNewRecs||[]);
  if(!allNew.length){el.innerHTML='<div class="empty">新着PO銘柄はまだ取得されていません</div>';return;}

  const stLabel={pending:"発表済（価格待ち）",nextday:"翌日入力済",complete:"完了"};
  const stClass={pending:"b-pend",nextday:"b-next",complete:"b-done"};

  el.innerHTML=allNew.slice().reverse().map(r=>`
    <div class="nr-card">
      <div class="nr-head">
        <span class="b ${stClass[r.status]||"b-pend"}">${stLabel[r.status]||r.status}</span>
        <span class="nr-name">${r.name}</span>
        <span class="b ${r.type==="リート"?"b-r":"b-n"}">${r.type}</span>
        ${r.alert?`<span class="b ${r.alert==="注意"?"b-c":"b-ban"}">${r.alert}</span>`:""}
        <span style="font-size:11px;color:#64748b">${r.announce_date||""} 発表</span>
      </div>
      <div class="nr-grid">
        <div><div style="color:#64748b;font-size:10px">時価総額(億)</div><div class="nr-val">${r.market_cap||"–"}</div></div>
        <div><div style="color:#64748b;font-size:10px">PO規模(億)</div><div class="nr-val">${r.po_scale||"–"}</div></div>
        <div><div style="color:#64748b;font-size:10px">翌日始値</div><div class="nr-val">${r.next_open||"–"}</div></div>
        <div><div style="color:#64748b;font-size:10px">騰落率(始)</div><div class="nr-val ${r.ret_open!=null?col(r.ret_open):""}">${r.ret_open!=null?fmt(r.ret_open):"–"}</div></div>
        <div><div style="color:#64748b;font-size:10px">騰落率(終)</div><div class="nr-val ${r.ret_close!=null?col(r.ret_close):""}">${r.ret_close!=null?fmt(r.ret_close):"–"}</div></div>
      </div>
    </div>`).join("");
}

/* ─────── メイン描画 ─────────────────────────────────────────────────────── */
function render(){
  buildCombined();
  filt=getFiltered();
  const opens=filt.map(r=>r.retOpen).filter(v=>v!=null);
  const closes=filt.map(r=>r.retClose).filter(v=>v!=null);
  const avgO=avg(opens),avgC=avg(closes);
  const wins=opens.filter(v=>v>0).length;

  document.getElementById("s0").textContent=filt.length;
  const s1=document.getElementById("s1");
  s1.textContent=avgO!=null?fmt(avgO):"–";
  s1.className="sv "+(avgO!=null?(avgO>=0?"pos":"neg"):"");
  const s2=document.getElementById("s2");
  s2.textContent=avgC!=null?fmt(avgC):"–";
  s2.className="sv "+(avgC!=null?(avgC>=0?"pos":"neg"):"");
  document.getElementById("s3").textContent=opens.length?((wins/opens.length*100).toFixed(1)+"%"):"–";

  renderCharts(filt);
  renderTable(filt);
  renderNewPanel();
}

/* ─────── ページ切替 ─────────────────────────────────────────────────────── */
function page(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("on"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.getElementById("p-"+id).classList.add("on");
  document.getElementById("t-"+id).classList.add("on");
}

    try{
      const res=await fetch("./data/po_records.json?t="+Date.now());
      if(!res.ok) return [];
      const j=await res.json();
      return j.records||j||[];
    }catch{return [];}
  })();
  render();
})();
</script>
